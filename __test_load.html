<!DOCTYPE html>
<html><body>
<pre id="out">starting...</pre>
<script>
var errs = [];
window.addEventListener('error', function(e){
  errs.push('ERROR: ' + e.message + ' at ' + e.filename + ':' + e.lineno + ':' + e.colno);
  document.getElementById('out').textContent = errs.join('\n');
});
</script>
<script src="js/vocabulary.js"></script>
<script src="js/progress.js"></script>
<script src="js/audio.js"></script>
<script src="js/games/flashcards.js"></script>
<script src="js/games/memory.js"></script>
<script src="js/games/typing.js"></script>
<script src="js/games/quiz.js"></script>
<script src="js/games/wordsearch.js"></script>
<script src="js/grammar.js"></script>
<script src="js/games/grammar-drill.js"></script>
<script>
  document.getElementById('out').textContent += '\n--- after all loads ---';
  document.getElementById('out').textContent += '\nVOCAB_WORDS: ' + (window.VOCAB_WORDS ? window.VOCAB_WORDS.length : 'undefined');
  document.getElementById('out').textContent += '\nFlashcardGame: ' + typeof window.FlashcardGame;
  document.getElementById('out').textContent += '\nVF: ' + typeof window.VF;
  document.getElementById('out').textContent += '\nerrs: ' + errs.length;
  document.getElementById('out').textContent += '\n' + errs.join('\n');
</script>
<script src="js/app.js"></script>
</body></html>
